<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waviate Script Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@latest/min/vs/loader.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Segoe UI', 'Ubuntu', 'Droid Sans', sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Activity Bar */
        .activity-bar {
            width: 50px;
            background-color: #333333;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
            padding: 10px 0;
        }

        .activity-btn {
            width: 50px;
            height: 50px;
            background: transparent;
            border: none;
            color: #858585;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .activity-btn:hover {
            color: #d4d4d4;
            background-color: #2d2d30;
        }

        .activity-btn.active {
            color: #ffffff;
            background-color: #0e639c;
            border-left: 2px solid #007acc;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background-color: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #3e3e42;
            font-size: 13px;
            font-weight: 600;
            color: #cccccc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .file-tree {
            list-style: none;
        }

        .file-item {
            padding: 6px 16px;
            cursor: pointer;
            user-select: none;
            font-size: 13px;
            color: #cccccc;
            transition: background-color 0.1s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-item:hover {
            background-color: #2d2d30;
        }

        .file-item.active {
            background-color: #37373d;
            color: #ffffff;
        }

        /* Main Editor Area */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #1e1e1e;
        }

        .tabs-bar {
            display: flex;
            background-color: #252526;
            border-bottom: 1px solid #3e3e42;
            height: 35px;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .tab {
            display: flex;
            align-items: center;
            padding: 0 12px;
            background-color: #1e1e1e;
            color: #858585;
            cursor: pointer;
            border-right: 1px solid #3e3e42;
            font-size: 13px;
            user-select: none;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab:hover {
            background-color: #2d2d30;
            color: #d4d4d4;
        }

        .tab.active {
            background-color: #1e1e1e;
            color: #cccccc;
            border-bottom: 2px solid #007acc;
        }

        .tab-close {
            background: none;
            border: none;
            color: #858585;
            cursor: pointer;
            font-size: 12px;
            padding: 0 4px;
            margin-left: 8px;
            transition: color 0.2s ease;
        }

        .tab-close:hover {
            color: #d4d4d4;
        }

        .editor-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .welcome {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: #858585;
        }

        .welcome h1 {
            font-size: 28px;
            color: #d4d4d4;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 24px;
            background-color: #007acc;
            color: #ffffff;
            padding: 0 16px;
            font-size: 12px;
            border-top: 1px solid #3e3e42;
        }

        .status-left, .status-right {
            display: flex;
            gap: 16px;
        }

        .status-item {
            cursor: pointer;
        }

        .status-item:hover {
            opacity: 0.8;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background-color: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #464647;
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #5a5a5a;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Activity Bar -->
        <div class="activity-bar">
            <button class="activity-btn active" data-tab="explorer" title="Explorer">[*]</button>
            <button class="activity-btn" data-tab="search" title="Search">[/]</button>
            <button class="activity-btn" data-tab="source" title="Source Control">[~]</button>
            <button class="activity-btn" data-tab="debug" title="Debug">[!]</button>
            <button class="activity-btn" data-tab="extensions" title="Extensions">[+]</button>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header" id="sidebarTitle">Explorer</div>
            <div class="sidebar-content">
                <ul class="file-tree" id="fileTree">
                    <li class="file-item" data-file-id="1" data-file-name="shader.c" data-language="c">
                        [f] shader.c
                    </li>
                    <li class="file-item" data-file-id="2" data-file-name="config.json" data-language="json">
                        [f] config.json
                    </li>
                </ul>
            </div>
        </div>

        <!-- Main Editor Area -->
        <div class="main-area">
            <div class="tabs-bar" id="tabsBar">
                <!-- Tabs inserted here -->
            </div>
            <div class="editor-container" id="editorContainer">
                <div class="welcome">
                    <h1>Open a file to start editing</h1>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <span class="status-item">Ln 1, Col 1</span>
            <span class="status-item">UTF-8</span>
        </div>
        <div class="status-right">
            <span class="status-item">Waviate Script v1.0</span>
        </div>
    </div>

    <script>
        var editor = null;
        var currentFile = null;
        var openFiles = {};
        var fileContents = {
            '1': '// shader.c\n#include "WaviateInput.h"\n\nfloat sample_process(const WaviateSampleInput* in, WaviateSampleStateWriter* out) {\n    return in->inputDeviceSamples[0][in->positionInBlock];\n}\n',
            '2': '{\n  "version": "1.0.0",\n  "name": "My Shader"\n}\n'
        };

        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@latest/min/vs' } });

        function initEditor() {
            require(['vs/editor/editor.main'], function() {
                editor = monaco.editor.create(document.getElementById('editorContainer'), {
                    value: '',
                    language: 'plaintext',
                    theme: 'vs-dark',
                    minimap: { enabled: true },
                    fontSize: 13,
                    fontFamily: "'Consolas', 'Monaco', 'Courier New', monospace",
                    lineNumbers: 'on',
                    scrollBeyondLastLine: false,
                    automaticLayout: true,
                    smoothScrolling: true,
                    cursorBlinking: 'blink',
                    renderLineHighlight: 'all'
                });

                setupFileTreeListeners();
            });
        }

        function setupFileTreeListeners() {
            var fileItems = document.querySelectorAll('.file-item');
            fileItems.forEach(function(item) {
                item.addEventListener('click', function() {
                    openFile(this.getAttribute('data-file-id'), this.getAttribute('data-file-name'), this.getAttribute('data-language'));
                });
            });
        }

        function openFile(fileId, fileName, language) {
            if (currentFile === fileId) return;

            var activeItems = document.querySelectorAll('.file-item.active');
            activeItems.forEach(function(item) { item.classList.remove('active'); });

            document.querySelector('[data-file-id="' + fileId + '"]').classList.add('active');

            currentFile = fileId;
            openFiles[fileId] = { name: fileName, language: language };

            updateTabs();
            setEditorContent(fileId, language);
        }

        function updateTabs() {
            var tabsBar = document.getElementById('tabsBar');
            tabsBar.innerHTML = '';

            Object.keys(openFiles).forEach(function(fileId) {
                var file = openFiles[fileId];
                var tab = document.createElement('div');
                tab.className = 'tab' + (fileId === currentFile ? ' active' : '');
                tab.innerHTML = '[f] ' + file.name + '<button class="tab-close">x</button>';
                
                tab.addEventListener('click', function(e) {
                    if (!e.target.classList.contains('tab-close')) {
                        currentFile = fileId;
                        updateTabs();
                        setEditorContent(fileId, file.language);
                    }
                });

                tab.querySelector('.tab-close').addEventListener('click', function(e) {
                    e.stopPropagation();
                    delete openFiles[fileId];
                    if (currentFile === fileId) {
                        currentFile = Object.keys(openFiles)[0] || null;
                        if (currentFile) {
                            var file = openFiles[currentFile];
                            updateTabs();
                            setEditorContent(currentFile, file.language);
                        } else {
                            document.getElementById('editorContainer').innerHTML = '<div class="welcome"><h1>Open a file to start editing</h1></div>';
                            updateTabs();
                        }
                    } else {
                        updateTabs();
                    }
                });

                tabsBar.appendChild(tab);
            });
        }

        function setEditorContent(fileId, language) {
            if (editor) {
                var content = fileContents[fileId] || '';
                editor.setValue(content);
                monaco.editor.setModelLanguage(editor.getModel(), language);
            }
        }

        function setupActivityBar() {
            var activityBtns = document.querySelectorAll('.activity-btn');
            activityBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var activeBtn = document.querySelector('.activity-btn.active');
                    if (activeBtn) activeBtn.classList.remove('active');
                    this.classList.add('active');
                    
                    var tab = this.getAttribute('data-tab');
                    var titles = {
                        'explorer': 'Explorer',
                        'search': 'Search',
                        'source': 'Source Control',
                        'debug': 'Debug',
                        'extensions': 'Extensions'
                    };
                    document.getElementById('sidebarTitle').textContent = titles[tab] || 'Panel';
                });
            });
        }

        // Initialize
        setupActivityBar();
        initEditor();
    </script>
</body>
</html>
